<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      background: #161616;
    }

    #chat-header {
      padding: 16px 20px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .user-message {
      background: #2f6feb;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .ai-message {
      background: #252525;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .thinking {
      background: #252525;
      color: #666;
      align-self: flex-start;
      font-style: italic;
      font-size: 13px;
    }

    #input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #2a2a2a;
      background: #1e1e1e;
    }

    #user-input {
      flex: 1;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px 14px;
      color: #f0f0f0;
      font-size: 14px;
      outline: none;
      resize: none;
      height: 44px;
    }

    #user-input:focus {
      border-color: #2f6feb;
    }

    #send-btn {
      background: #2f6feb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #1a5cd8; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">AI Chat</div>

  <div id="messages">
    <div class="message ai-message">Hello! How can I help you today?</div>
  </div>

  <div id="input-area">
    <textarea
      id="user-input"
      placeholder="Type a message..."
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(text, type) {
    const div = document.createElement('div');
    div.classList.add('message', type);
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user-message');
    input.value = '';
    sendBtn.disabled = true;

    const thinking = addMessage('Thinking...', 'thinking');

    try {
      const response = await fetch('http://localhost:8000/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
      });

      const data = await response.json();

      thinking.remove();
      addMessage(data.reply, 'ai-message');

    } catch (error) {
      thinking.remove();
      addMessage('Error: Could not reach the API. Is your server running?', 'thinking');
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
